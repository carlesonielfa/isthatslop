<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --background: rgb(127 177 179);
      --card: rgb(192 192 192);
      --primary: rgb(127 177 179);
      --primary-foreground: oklch(0.98 0.02 201);
      --foreground: oklch(0.141 0.005 285.823);
      --border: rgb(247 247 247);
      --border-dark: rgb(96 96 96);
      --muted-foreground: oklch(36.189% 0.00856 285.902);
    }

    body {
      width: 300px;
      min-height: 120px;
      margin: 0;
      font-size: 12px;
      font-family: system-ui, sans-serif;
      background: var(--background);
    }

    .window {
      border-top-color: var(--border);
      border-left-color: var(--border);
      border-bottom-color: var(--border-dark);
      border-right-color: var(--border-dark);
      border-width: 2px;
      border-style: solid;
    }

    .title-bar {
      background: var(--primary);
      color: var(--primary-foreground);
      padding: 4px 8px;
      font-weight: 600;
      font-size: 13px;
    }

    #content {
      padding: 12px;
      background: var(--card);
    }

    .tier-badge {
      display: inline-block;
      padding: 2px 8px;
      color: white;
      font-weight: 600;
      font-size: 11px;
    }

    .source-link {
      background: var(--card);
      border-top-color: var(--border);
      border-left-color: var(--border);
      border-bottom-color: var(--border-dark);
      border-right-color: var(--border-dark);
      border-width: 1px;
      border-style: solid;
      padding: 4px 10px;
      cursor: pointer;
      text-decoration: none;
      font-size: 11px;
      display: inline-block;
      margin-top: 8px;
      color: var(--foreground);
    }

    .sign-in-btn {
      display: block;
      margin-top: 8px;
      padding: 4px 10px;
      font-size: 11px;
      background: var(--card);
      border-top-color: var(--border);
      border-left-color: var(--border);
      border-bottom-color: var(--border-dark);
      border-right-color: var(--border-dark);
      border-width: 1px;
      border-style: solid;
      text-decoration: none;
      color: var(--muted-foreground);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="title-bar">IsThatSlop</div>
    <div id="content">Loading...</div>
  </div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
