apiVersion: v1
kind: Namespace
metadata:
  name: isthatslop-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isthatslop
  namespace: isthatslop-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: isthatslop
  template:
    metadata:
      labels:
        app: isthatslop
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: isthatslop
          image: ghcr.io/${GITHUB_REGISTRY_USER}/isthatslop:main
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: isthatslop-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: isthatslop
  namespace: isthatslop-production
spec:
  selector:
    app: isthatslop
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: isthatslop
  namespace: isthatslop-production
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: ${APP_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: isthatslop
                port:
                  number: 3000
  tls:
    - secretName: isthatslop-tls
      hosts:
        - ${APP_DOMAIN}
